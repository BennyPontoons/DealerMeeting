<?xml version="1.0" encoding="UTF-8"?>
<!-- PLACEHOLDER boat image. Used by s-one.html and lx.html until real
     photos are added. To replace: drop the real photo into
     "NO Background boat photots/" and update the <img> src on the page. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Boat photo coming soon">
  <!-- dashed frame -->
  <rect x="12" y="12" width="616" height="336" rx="24" fill="rgba(255,255,255,0.04)"
        stroke="#c3a76f" stroke-width="2" stroke-dasharray="10 8" opacity="0.8"/>
  <!-- simple pontoon silhouette -->
  <g opacity="0.9">
    <!-- bimini top -->
    <path d="M250 118 L420 118 L400 96 L270 96 Z" fill="#e4d5b8"/>
    <line x1="262" y1="118" x2="262" y2="158" stroke="#e4d5b8" stroke-width="5"/>
    <line x1="408" y1="118" x2="408" y2="158" stroke="#e4d5b8" stroke-width="5"/>
    <!-- fence / deck -->
    <path d="M150 160 L490 160 L510 178 L510 196 L150 196 Z" fill="#22456d"/>
    <rect x="150" y="152" width="340" height="10" rx="5" fill="#c3a76f"/>
    <!-- outboard -->
    <rect x="512" y="168" width="26" height="42" rx="6" fill="#17304e"/>
    <!-- pontoon tube -->
    <rect x="138" y="204" width="392" height="26" rx="13" fill="#8fa3b8"/>
    <!-- waterline -->
    <path d="M100 252 q 30 -12 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0 t 60 0"
          fill="none" stroke="#22456d" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text x="320" y="300" text-anchor="middle" font-family="Manrope, system-ui, sans-serif"
        font-size="19" font-weight="800" letter-spacing="4" fill="#c3a76f">PHOTO COMING SOON</text>
</svg>
